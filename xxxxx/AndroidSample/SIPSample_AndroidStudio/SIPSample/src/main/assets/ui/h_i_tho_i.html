<!DOCTYPE html>
<html class="light" lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0, viewport-fit=cover" name="viewport"/>
  <title>Chats - The Fluid Connection</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script src="https://cdn.jsdelivr.net/npm/stream-chat/dist/browser/index.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;700;800&amp;display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
  <style>
    body { font-family: 'Be Vietnam Pro', sans-serif; background-color: #f7f9fc; }
  </style>
</head>
<body class="bg-[#f7f9fc] text-[#191c1e] min-h-screen flex flex-col">
<header class="fixed top-0 w-full z-50 bg-slate-50/80 backdrop-blur-xl">
  <div class="flex justify-between items-center px-4 py-2 w-full">
    <div class="flex items-center gap-3">
      <button class="p-2 rounded-full"><span class="material-symbols-outlined">arrow_back</span></button>
      <div>
        <h1 class="font-bold">Alex Rivera</h1>
        <span class="text-xs text-[#414754]">Online</span>
      </div>
    </div>
    <div class="flex items-center gap-1">
      <button class="p-2 text-blue-600 rounded-full"><span class="material-symbols-outlined">call</span></button>
      <button class="p-2 text-blue-600 rounded-full"><span class="material-symbols-outlined">videocam</span></button>
    </div>
  </div>
</header>
<main class="flex-1 pt-20 pb-24 px-4 max-w-3xl mx-auto w-full space-y-4">
  <div id="streamStatus" class="text-xs text-[#414754]"></div>
  <div class="flex justify-center my-6">
    <span class="bg-[#f2f4f7] px-4 py-1 rounded-full text-xs">Today</span>
  </div>
  <div class="max-w-[75%] bg-[#e6e8eb] px-5 py-3 rounded-xl">
    <p>Hey! Did you see the latest concept for the editorial app?</p>
  </div>
  <div class="ml-auto max-w-[75%] bg-gradient-to-br from-[#005bb3] to-[#0073df] text-white px-5 py-3 rounded-xl">
    <p>Not yet. Is it using that new translucent stream theme we discussed?</p>
  </div>
  <div id="streamMessages" class="space-y-2 text-sm"></div>
</main>
<script>
  (async function initStream() {
    const statusEl = document.getElementById("streamStatus");
    const listEl = document.getElementById("streamMessages");
    try {
      if (!window.__streamConfig || !window.__streamConfig.apiKey) {
        statusEl.textContent = "Stream config missing.";
        return;
      }
      statusEl.textContent = "Connecting Stream...";
      const client = StreamChat.StreamChat.getInstance(window.__streamConfig.apiKey);
      await client.connectUser(
        { id: window.__streamConfig.userId, name: window.__streamConfig.userName },
        window.__streamConfig.token
      );
      const channel = client.channel("messaging", "appcall-demo", { name: "AppCall Demo" });
      await channel.watch();
      statusEl.textContent = "Stream connected: #" + channel.id;
      channel.state.messages.slice(-5).forEach((m) => {
        const item = document.createElement("div");
        item.className = "bg-[#e6e8eb] rounded-xl px-3 py-2";
        item.textContent = (m.user?.name || m.user?.id || "user") + ": " + (m.text || "");
        listEl.appendChild(item);
      });
    } catch (e) {
      statusEl.textContent = "Stream error: " + (e?.message || e);
    }
  })();
</script>
</body>
</html>
