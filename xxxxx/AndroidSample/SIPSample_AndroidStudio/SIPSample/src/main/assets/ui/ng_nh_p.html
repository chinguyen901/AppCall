<!DOCTYPE html>
<html class="light" lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>Login - Messenger</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
  <style>
    body { font-family: 'Be Vietnam Pro', sans-serif; min-height: 100vh; }
    .bg-messenger-gradient { background: linear-gradient(135deg, #005bb3 0%, #0073df 100%); }
  </style>
</head>
<body class="bg-[#f7f9fc] text-[#191c1e] min-h-screen flex flex-col">
<main class="flex-grow flex flex-col items-center justify-center px-6 py-12 max-w-md mx-auto w-full">
  <div class="mb-12 text-center">
    <div class="inline-flex items-center justify-center w-20 h-20 bg-messenger-gradient rounded-xl mb-6 shadow-xl shadow-primary/10">
      <span class="material-symbols-outlined text-white text-5xl" style="font-variation-settings: 'FILL' 1;">chat_bubble</span>
    </div>
    <h1 class="text-4xl font-extrabold tracking-tight mb-2">Connect</h1>
    <p class="text-[#414754] font-medium">Log in to your account</p>
  </div>
  <form class="w-full space-y-4">
    <input class="w-full bg-[#e0e3e6] border-none rounded-full px-6 py-4" placeholder="Email or Phone" type="text"/>
    <input class="w-full bg-[#e0e3e6] border-none rounded-full px-6 py-4" placeholder="Password" type="password"/>
    <button class="w-full bg-messenger-gradient text-white font-bold py-4 rounded-full" type="submit">Log In</button>
  </form>
  <div class="w-full mt-6">
    <button class="w-full bg-[#e6e8eb] text-[#005bb3] font-bold py-4 rounded-full" type="button">Create New Account</button>
  </div>
</main>
</body>
</html>
