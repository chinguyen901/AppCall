<!DOCTYPE html>
<html class="light" lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>Chats - The Fluid Connection</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@100;300;400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
  <style>
    body { font-family: 'Be Vietnam Pro', sans-serif; background-color: #f7f9fc; }
  </style>
</head>
<body class="bg-[#f7f9fc] text-[#191c1e] min-h-screen">
<header class="fixed top-0 w-full z-50 bg-slate-50/80 backdrop-blur-xl">
  <div class="flex justify-between items-center px-4 py-2 w-full">
    <h1 class="text-xl font-bold">Chats</h1>
    <button class="w-10 h-10 rounded-full">+</button>
  </div>
</header>
<main class="pt-16 pb-24 max-w-2xl mx-auto px-4">
  <div class="mt-4 mb-6">
    <div class="flex items-center gap-3 bg-[#e0e3e6] px-4 py-3 rounded-full">
      <input class="bg-transparent border-none w-full" placeholder="Search" type="text"/>
    </div>
  </div>
  <section class="space-y-1">
    <div class="flex items-center gap-4 p-3 rounded-2xl bg-[#f2f4f7] cursor-pointer">
      <div class="w-14 h-14 rounded-full bg-[#a6c5fd]"></div>
      <div class="flex-grow min-w-0">
        <h3 class="font-bold truncate">Sarah Wilson</h3>
        <p class="text-sm truncate">Can't wait to see the final designs!</p>
      </div>
    </div>
    <div class="flex items-center gap-4 p-3 rounded-2xl bg-[#f2f4f7] cursor-pointer">
      <div class="w-14 h-14 rounded-full bg-[#a6c5fd]"></div>
      <div class="flex-grow min-w-0">
        <h3 class="font-bold truncate">David Chen</h3>
        <p class="text-sm truncate">Let's touch base tomorrow morning.</p>
      </div>
    </div>
  </section>
</main>
</body>
</html>
