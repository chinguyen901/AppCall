#!KAMAILIO

debug=3
log_stderror=yes
fork=yes
children=8
listen=udp:0.0.0.0:5060
alias="kamailio"

loadmodule "sl.so"
loadmodule "tm.so"
loadmodule "rr.so"
loadmodule "maxfwd.so"
loadmodule "usrloc.so"
loadmodule "registrar.so"
loadmodule "textops.so"
loadmodule "siputils.so"
loadmodule "dispatcher.so"
loadmodule "nathelper.so"
loadmodule "xlog.so"

modparam("usrloc", "db_mode", 0)
modparam("registrar", "method_filtering", 1)
modparam("registrar", "max_expires", 3600)

modparam("dispatcher", "list_file", "/etc/kamailio/dispatcher.list")
modparam("dispatcher", "flags", 2)
modparam("dispatcher", "ds_ping_interval", 10)

modparam("nathelper", "natping_interval", 30)
modparam("nathelper", "ping_nated_only", 1)
modparam("nathelper", "sipping_bflag", 6)
modparam("nathelper", "received_avp", "$avp(RECEIVED)")

request_route {
    if (!mf_process_maxfwd_header("10")) {
        sl_send_reply("483", "Too Many Hops");
        exit;
    }

    if (nat_uac_test("19")) {
        fix_nated_contact();
        setbflag(6);
    }

    if (is_method("REGISTER")) {
        if (!save("location")) {
            sl_reply_error();
        } else {
            xlog("L_INFO", "REGISTER saved for $au from $si:$sp\n");
            sl_send_reply("200", "OK");
        }
        exit;
    }

    if (is_method("INVITE")) {
        record_route();
    }

    if (is_method("INVITE|SUBSCRIBE|MESSAGE")) {
        if (lookup("location")) {
            xlog("L_INFO", "Routing to registered user $ru\n");
            route(RELAY);
            exit;
        }
    }

    # Fallback/load balancing to PBX pool.
    if (is_method("INVITE")) {
        if (!ds_select_dst("1", "4")) {
            sl_send_reply("500", "No PBX Available");
            exit;
        }
        xlog("L_INFO", "Dispatcher selected PBX dst=$du for $ru\n");
        route(RELAY);
        exit;
    }

    if (is_method("BYE|CANCEL|ACK|OPTIONS|INFO|UPDATE|PRACK")) {
        route(RELAY);
        exit;
    }

    sl_send_reply("404", "Not Found");
}

route[RELAY] {
    if (!t_relay()) {
        sl_reply_error();
    }
    exit;
}
