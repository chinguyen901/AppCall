[global]
type=global
user_agent=Asterisk2

[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0:5060
local_net=0.0.0.0/0

; Endpoint 1001
[1001]
type=endpoint
context=from-internal
disallow=all
allow=ulaw
auth=1001-auth
aors=1001
rtp_symmetric=yes
force_rport=yes
rewrite_contact=yes
direct_media=no

[1001-auth]
type=auth
auth_type=userpass
username=1001
password=123456

[1001]
type=aor
max_contacts=3
remove_existing=yes

; Endpoint 1002
[1002]
type=endpoint
context=from-internal
disallow=all
allow=ulaw
auth=1002-auth
aors=1002
rtp_symmetric=yes
force_rport=yes
rewrite_contact=yes
direct_media=no

[1002-auth]
type=auth
auth_type=userpass
username=1002
password=123456

[1002]
type=aor
max_contacts=3
remove_existing=yes
