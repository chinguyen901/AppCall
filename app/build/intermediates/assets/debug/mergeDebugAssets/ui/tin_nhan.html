<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tin nhan</title>
  <style>
    body { margin: 0; font-family: Arial, sans-serif; background: #f7f9fc; color: #191c1e; }
    .header { position: sticky; top: 0; background: #ffffffcc; backdrop-filter: blur(12px); padding: 14px 16px; font-weight: 700; }
    .list { padding: 10px 12px 90px; }
    .item { background: #fff; border-radius: 16px; padding: 12px; margin-bottom: 10px; }
    .name { font-weight: 700; margin-bottom: 4px; }
    .msg { color: #5c6270; font-size: 14px; }
    .bottom { position: fixed; bottom: 0; left: 0; right: 0; height: 64px; background: #ffffffcc; backdrop-filter: blur(12px); display: flex; align-items: center; justify-content: space-around; }
  </style>
</head>
<body>
  <div class="header">Chats</div>
  <div class="list">
    <div class="item"><div class="name">Sarah Wilson</div><div class="msg">Can't wait to see the final designs! 🔥</div></div>
    <div class="item"><div class="name">David Chen</div><div class="msg">You: Let's touch base tomorrow morning.</div></div>
    <div class="item"><div class="name">Design Stream Team</div><div class="msg">Elena: Just shared the Figma link!</div></div>
    <div class="item"><div class="name">Marcus Thorne</div><div class="msg">The weekend plans sound great.</div></div>
  </div>
  <div class="bottom">
    <span>Chat</span><span>Group</span><span>Stories</span><span>Profile</span>
  </div>
</body>
</html>
