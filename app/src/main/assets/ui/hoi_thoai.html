<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hoi thoai</title>
  <style>
    body { margin: 0; font-family: Arial, sans-serif; background: #f7f9fc; color: #191c1e; }
    .header { position: sticky; top: 0; background: #ffffffcc; backdrop-filter: blur(12px); padding: 14px 16px; font-weight: 700; }
    .chat { padding: 12px 12px 84px; }
    .left,.right { max-width: 78%; margin-bottom: 10px; padding: 10px 12px; border-radius: 16px; }
    .left { background: #e6e8eb; border-bottom-left-radius: 6px; }
    .right { background: #0073df; color: #fff; border-bottom-right-radius: 6px; margin-left: auto; }
    .input { position: fixed; bottom: 0; left: 0; right: 0; background: #ffffffcc; backdrop-filter: blur(12px); padding: 10px; display: flex; gap: 8px; }
    input { flex: 1; border: none; border-radius: 999px; padding: 12px; background: #e0e3e6; }
    button { border: none; border-radius: 999px; padding: 12px 16px; background: #005bb3; color: #fff; }
  </style>
</head>
<body>
  <div class="header">Alex Rivera</div>
  <div class="chat">
    <div class="left">Hey! Did you see the latest concept for the editorial app?</div>
    <div class="right">Not yet. Is it using that new translucent stream theme we discussed?</div>
    <div class="left">Exactly. It feels so much more fluid.</div>
    <div class="right">That looks incredible.</div>
  </div>
  <div class="input">
    <input placeholder="Type a message..." />
    <button>Send</button>
  </div>
</body>
</html>
